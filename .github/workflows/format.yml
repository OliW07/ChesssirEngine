name: Format Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download clang-format (v21)
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.0/LLVM-21.1.0-Linux-X64.tar.xz
          tar -xf LLVM-*.tar.xz
          sudo cp LLVM-*/bin/clang-format /usr/local/bin/
          rm -rf LLVM-*
          clang-format --version

      - name: Check formatting
        run: |
          files=$(find src tools -type f \( -name '*.c' -o -name '*.cpp' -o -name '*.cxx' -o -name '*.cc' -o -name '*.h' -o -name '*.hpp' -o -name '*.hxx' \) 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No C/C++ files found to check."
            exit 0
          fi
          violations=0
          for f in $files; do
            if ! clang-format --dry-run --Werror "$f" 2>/dev/null; then
              diff=$(clang-format "$f" | diff -u "$f" - 2>/dev/null || true)
              echo "::error file=$f,line=1::formatting violation"
              echo "$diff"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "❌ $violations file(s) need formatting. Run: clang-format -i src/**/*.{cpp,h} tools/**/*.{cpp,h}"
            exit 1
          fi
          echo "✅ All files are correctly formatted."
