name: Format Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          files=$(find src tools -type f \( -name '*.c' -o -name '*.cpp' -o -name '*.cxx' -o -name '*.cc' -o -name '*.h' -o -name '*.hpp' -o -name '*.hxx' \) 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "No C/C++ files found to check."
            exit 0
          fi
          violations=0
          for f in $files; do
            if ! clang-format --dry-run --Werror "$f" 2>/dev/null; then
              echo "::error file=$f::formatting violation"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "❌ $violations file(s) need formatting."
            echo "Run: clang-format -i src/**/*.{cpp,h} tools/**/*.{cpp,h}"
            exit 1
          fi
          echo "✅ All files are correctly formatted."
